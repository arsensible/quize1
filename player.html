<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎌 Аниме Квиз</title>
<style>
:root {
  --bg: #0d0d1f;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f97316;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: rgba(255,255,255,0.1);
  --card: rgba(255,255,255,0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { height: -webkit-fill-available; }

body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(236,72,153,0.12) 0%, transparent 55%);
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  overflow-x: hidden;
  overflow-y: auto;
}

.screen { display: none; width: 100%; max-width: 480px; }
.screen.active {
  display: flex; flex-direction: column; align-items: center; gap: 22px;
  animation: fadein 0.3s ease;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══ NAME SCREEN ══ */
.logo {
  font-size: 64px;
  filter: drop-shadow(0 0 24px rgba(139,92,246,0.6));
}

h1 {
  font-size: 36px; font-weight: 900; letter-spacing: -1.5px;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center;
}

h2 {
  font-size: 26px; font-weight: 900;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-align: center;
}

.subtitle {
  font-size: 15px; color: var(--muted); text-align: center; line-height: 1.65;
}

.name-input {
  width: 100%; padding: 18px 20px; border-radius: 14px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--text); font-size: 20px; font-weight: 600; font-family: inherit;
  outline: none; text-align: center;
  transition: border-color .2s, background .2s;
}
.name-input::placeholder { color: var(--muted); }
.name-input:focus {
  border-color: rgba(139,92,246,0.6);
  background: rgba(139,92,246,0.08);
}

.btn-join {
  width: 100%; padding: 18px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff; font-size: 20px; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: opacity .2s, transform .15s;
  box-shadow: 0 8px 32px rgba(139,92,246,0.4);
}
.btn-join:active { opacity: .82; transform: scale(0.98); }

/* ══ LOBBY SCREEN ══ */
.status-icon { font-size: 68px; filter: drop-shadow(0 0 20px rgba(139,92,246,0.5)); }

.player-badge {
  background: rgba(139,92,246,0.18);
  border: 1.5px solid rgba(139,92,246,0.5);
  color: #c4b5fd; font-size: 16px; font-weight: 700;
  padding: 9px 24px; border-radius: 99px;
}

.pulse-wrap {
  position: relative; width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.pulse-dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(139,92,246,0.7);
  position: relative;
}
.pulse-dot::before, .pulse-dot::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%; background: rgba(139,92,246,0.4);
  animation: ping 1.6s ease-out infinite;
}
.pulse-dot::after { animation-delay: .65s; }

@keyframes ping {
  0%   { transform: scale(1); opacity: 0.7; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* ══ QUESTION SCREEN ══ */
#questionScreen {
  gap: 0;
  min-height: calc(100vh - 48px);
  justify-content: space-between;
}

.top-bar {
  width: 100%;
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 16px;
}
.q-counter { font-size: 13px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.prog-bar  { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 99px; transition: width .4s ease; }

.anime-tag-row { width: 100%; padding-bottom: 14px; }
.anime-tag {
  display: inline-block;
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.15));
  border: 1px solid rgba(139,92,246,0.4);
  color: #c4b5fd; font-size: 12px; font-weight: 700;
  letter-spacing: .4px; padding: 5px 14px; border-radius: 99px; text-transform: uppercase;
}

.q-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 10px 0;
}
.q-text {
  font-size: clamp(17px, 5vw, 22px); font-weight: 800;
  line-height: 1.55; text-align: center; white-space: pre-line;
}

.answer-section {
  width: 100%; display: flex; flex-direction: column; gap: 11px; padding: 10px 0;
}

.answer-input {
  width: 100%; padding: 16px 18px; border-radius: 13px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--text); font-size: 17px; font-weight: 600; font-family: inherit;
  outline: none;
  transition: border-color .2s, background .2s;
}
.answer-input:focus { border-color: rgba(139,92,246,0.55); background: rgba(139,92,246,0.07); }
.answer-input:disabled { opacity: 0.5; }

.btn-submit {
  width: 100%; padding: 16px; border-radius: 13px; border: none;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff; font-size: 17px; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: opacity .2s, transform .15s;
  box-shadow: 0 6px 24px rgba(139,92,246,0.35);
}
.btn-submit:active { opacity: .82; transform: scale(0.98); }
.btn-submit:disabled {
  background: rgba(255,255,255,0.1); color: var(--muted);
  box-shadow: none; cursor: not-allowed;
}
.btn-submit.sent {
  background: linear-gradient(135deg, #059669, #10b981);
  box-shadow: 0 6px 24px rgba(16,185,129,0.3);
}

.timer-row {
  width: 100%; display: flex; justify-content: center; padding-bottom: 8px;
}
.timer-wrap { position: relative; width: 80px; height: 80px; }
.timer-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.t-bg  { stroke: rgba(255,255,255,0.08); }
.t-ring {
  stroke: #8b5cf6;
  stroke-dasharray: 276.46; /* 2π × 44 */
  stroke-dashoffset: 0;
  transition: stroke .4s;
}
.timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 900;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.timer-wrap.urgent .timer-num { animation: pulse .5s ease infinite; }

/* ══ DONE SCREEN ══ */
#doneScreen { text-align: center; }
</style>
</head>
<body>

<!-- ══ NAME ══ -->
<div class="screen active" id="nameScreen">
  <div class="logo">🎌</div>
  <h1>Аниме Квиз</h1>
  <p class="subtitle">Введи своё имя для участия</p>
  <input type="text" id="nameInput" class="name-input"
         placeholder="Твоё имя…" maxlength="20"
         autocomplete="off" autocorrect="off" autocapitalize="words"
         onkeydown="if(event.key==='Enter') joinQuiz()">
  <button class="btn-join" onclick="joinQuiz()">Войти →</button>
</div>

<!-- ══ LOBBY ══ -->
<div class="screen" id="lobbyScreen">
  <div class="status-icon">⏳</div>
  <h2>Готов к игре!</h2>
  <div class="player-badge" id="myNameBadge"></div>
  <div class="pulse-wrap"><div class="pulse-dot"></div></div>
  <p class="subtitle">Ведущий скоро начнёт раунд…</p>
</div>

<!-- ══ QUESTION ══ -->
<div class="screen" id="questionScreen">
  <div class="top-bar">
    <span class="q-counter" id="pQCounter">1 / 11</span>
    <div class="prog-bar"><div class="prog-fill" id="pProgFill" style="width:0%"></div></div>
  </div>
  <div class="anime-tag-row">
    <span class="anime-tag" id="pAnimeTag"></span>
  </div>
  <div class="q-area">
    <div class="q-text" id="pQText"></div>
  </div>
  <div class="answer-section">
    <input type="text" id="answerInput" class="answer-input"
           placeholder="Твой ответ…" maxlength="120"
           autocomplete="off" autocorrect="off"
           onkeydown="if(event.key==='Enter') submitAnswer()">
    <button class="btn-submit" id="submitBtn" onclick="submitAnswer()">Отправить ✓</button>
  </div>
  <div class="timer-row">
    <div class="timer-wrap" id="timerWrap">
      <svg viewBox="0 0 100 100" width="80" height="80">
        <circle class="t-bg"   cx="50" cy="50" r="44" fill="none" stroke-width="6"/>
        <circle class="t-ring" id="tRing" cx="50" cy="50" r="44" fill="none" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <div class="timer-num" id="timerNum">20</div>
    </div>
  </div>
</div>

<!-- ══ DONE ══ -->
<div class="screen" id="doneScreen">
  <div class="logo">🎉</div>
  <h2>Раунд завершён!</h2>
  <p class="subtitle">Ответы сохранены.<br>Ждём результатов!</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════
//  Firebase config
// ════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyA4Tky1LeabkKZf2qKodepAuU-Szku58Tg",
  authDomain:        "anime-ca12d.firebaseapp.com",
  databaseURL:       "https://anime-ca12d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "anime-ca12d",
  storageBucket:     "anime-ca12d.firebasestorage.app",
  messagingSenderId: "855385654507",
  appId:             "1:855385654507:web:faf03ef219bc14676aeaae"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════
const CIRC = 276.46; // 2π × 44

let myName       = '';
let myNameRaw    = '';
let currentQ     = -1;
let timePerQ     = 20;
let raf          = null;
let sessionRef   = null;

// ════════════════════════════════════════════════
//  Screens
// ════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ════════════════════════════════════════════════
//  Join
// ════════════════════════════════════════════════
function joinQuiz() {
  const raw = document.getElementById('nameInput').value.trim();
  if (!raw) {
    document.getElementById('nameInput').focus();
    return;
  }

  // Firebase keys can't contain . # $ / [ ]
  const safe = raw.replace(/[.#$\/\[\]]/g, '_').slice(0, 20);
  if (!safe.replace(/_/g, '')) {
    alert('Имя содержит недопустимые символы');
    return;
  }

  myNameRaw = raw;
  myName    = safe;

  // Save to localStorage so page refresh doesn't lose name
  try { localStorage.setItem('quizName', safe); localStorage.setItem('quizNameRaw', raw); } catch(e) {}

  // Register presence
  db.ref('players/' + myName).set({ name: raw, joined: Date.now() });

  document.getElementById('myNameBadge').textContent = '👤 ' + raw;
  showScreen('lobbyScreen');

  // Subscribe to session
  listenSession();
}

// ════════════════════════════════════════════════
//  Session listener
// ════════════════════════════════════════════════
function listenSession() {
  if (sessionRef) sessionRef.off();
  sessionRef = db.ref('session');

  sessionRef.on('value', snap => {
    const s = snap.val();
    if (!s || !s.active || s.currentQ === -1) {
      // Lobby / not started
      stopTimer();
      if (!document.getElementById('lobbyScreen').classList.contains('active')) {
        showScreen('lobbyScreen');
      }
      return;
    }

    if (s.currentQ === -2) {
      // Quiz ended
      stopTimer();
      showScreen('doneScreen');
      return;
    }

    // New question
    if (s.currentQ !== currentQ) {
      currentQ = s.currentQ;
      timePerQ = s.timePerQuestion || 20;
      renderQuestion(s);
    }
  });
}

// ════════════════════════════════════════════════
//  Render question
// ════════════════════════════════════════════════
function renderQuestion(s) {
  const qi    = s.currentQ;
  const total = s.totalQuestions;

  document.getElementById('pQCounter').textContent   = (qi + 1) + ' / ' + total;
  document.getElementById('pProgFill').style.width   = (qi / total * 100) + '%';
  document.getElementById('pAnimeTag').textContent   = s.animeName    || '';
  document.getElementById('pQText').textContent      = s.questionText || '';

  // Reset answer area
  const input = document.getElementById('answerInput');
  const btn   = document.getElementById('submitBtn');
  input.value    = '';
  input.disabled = false;
  btn.disabled   = false;
  btn.textContent = 'Отправить ✓';
  btn.classList.remove('sent');

  // Check if already answered this question (e.g. after back navigation by host)
  db.ref('answers/' + myName + '/' + qi).once('value', snap => {
    if (snap.val() !== null && snap.val() !== '') {
      input.value    = snap.val();
      input.disabled = true;
      btn.disabled   = true;
      btn.textContent = '✓ Ответ принят';
      btn.classList.add('sent');
    }
  });

  showScreen('questionScreen');

  // Focus input after a brief delay (mobile keyboard)
  setTimeout(() => { if (!input.disabled) input.focus(); }, 200);

  // Start timer synced with host
  stopTimer();
  const elapsed = Date.now() - (s.startTime || Date.now());
  const leftMs  = Math.max(500, (timePerQ * 1000) - elapsed);
  startTimer(leftMs);
}

// ════════════════════════════════════════════════
//  Submit answer
// ════════════════════════════════════════════════
function submitAnswer() {
  const val = document.getElementById('answerInput').value.trim();
  if (!val) {
    document.getElementById('answerInput').focus();
    return;
  }

  db.ref('answers/' + myName + '/' + currentQ).set(val);

  const input = document.getElementById('answerInput');
  const btn   = document.getElementById('submitBtn');
  input.disabled  = true;
  btn.disabled    = true;
  btn.textContent = '✓ Ответ принят';
  btn.classList.add('sent');
}

// ════════════════════════════════════════════════
//  Timer
// ════════════════════════════════════════════════
function stopTimer() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
}

function startTimer(leftMs) {
  const startPerf = performance.now();
  const totalMs   = timePerQ * 1000;

  function tick() {
    const gone = performance.now() - startPerf;
    const left = Math.max(0, leftMs - gone);
    const frac = left / totalMs;
    const secs = Math.ceil(left / 1000);

    const ring = document.getElementById('tRing');
    ring.style.strokeDashoffset = CIRC * (1 - frac);
    ring.style.stroke = frac > .5 ? '#8b5cf6' : frac > .25 ? '#f97316' : '#ef4444';

    document.getElementById('timerNum').textContent = secs;
    document.getElementById('timerWrap').classList.toggle('urgent', frac <= .25);

    if (left <= 0) return;
    raf = requestAnimationFrame(tick);
  }
  tick();
}

// ════════════════════════════════════════════════
//  Auto-restore name from localStorage
// ════════════════════════════════════════════════
(function() {
  try {
    const saved    = localStorage.getItem('quizName');
    const savedRaw = localStorage.getItem('quizNameRaw');
    if (saved) {
      myName    = saved;
      myNameRaw = savedRaw || saved;
      db.ref('players/' + myName).set({ name: myNameRaw, joined: Date.now() });
      document.getElementById('myNameBadge').textContent = '👤 ' + myNameRaw;
      showScreen('lobbyScreen');
      listenSession();
    }
  } catch(e) {}
})();
</script>
</body>
</html>
